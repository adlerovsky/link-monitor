[build]
builder = "NIXPACKS"
buildCommand = "if [ \"$LM_SERVICE_ROLE\" = \"worker\" ]; then echo 'worker build: skipped'; else cd apps/web && npm install && npm run prisma:generate && npm run build; fi"

[deploy]
startCommand = "if [ \"$LM_SERVICE_ROLE\" = \"worker\" ]; then node worker/run-due-worker.mjs; else cd apps/web && npm start; fi"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10