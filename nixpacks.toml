[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["if [ \"$LM_SERVICE_ROLE\" = \"worker\" ]; then echo 'worker install: skipped'; else cd apps/web && npm install; fi"]

[phases.build]
cmds = ["if [ \"$LM_SERVICE_ROLE\" = \"worker\" ]; then echo 'worker build: skipped'; else cd apps/web && npm run prisma:generate && npx prisma migrate deploy --schema prisma/schema.prisma && npm run build; fi"]

[start]
cmd = "if [ \"$LM_SERVICE_ROLE\" = \"worker\" ]; then node worker/run-due-worker.mjs; else cd apps/web && npx prisma migrate deploy --schema prisma/schema.prisma && npm start; fi"