version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lm_postgres
    environment:
      POSTGRES_USER: lm
      POSTGRES_PASSWORD: lm
      POSTGRES_DB: lm
    ports:
      - "5432:5432"
    volumes:
      - lm_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: lm_redis
    ports:
      - "6379:6379"
    volumes:
      - lm_redisdata:/data

volumes:
  lm_pgdata:
  lm_redisdata: